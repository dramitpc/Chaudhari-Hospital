        chiefComplaint:
          type: ["string", "null"]
        soapSubjective:
          type: ["string", "null"]
        soapObjective:
          type: ["string", "null"]
        soapAssessment:
          type: ["string", "null"]
        soapPlan:
          type: ["string", "null"]
        investigationOrders:
          type: ["string", "null"]
        patientLanguage:
