components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── AUTH SCHEMAS ─────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    RefreshTokenInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    AdminResetPasswordInput:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string

    # ── USER SCHEMAS ─────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, username, role, fullName, isActive, createdAt]
      properties:
        id:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [admin, doctor, staff, radiographer]
        fullName:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        registrationNumber:
          type: ["string", "null"]
        specialization:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    UserInput:
      type: object
      required: [username, password, role, fullName]
      properties:
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, doctor, staff, radiographer]
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        registrationNumber:
          type: string
        specialization:
          type: string

    UserUpdate:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        registrationNumber:
          type: string
        specialization:
          type: string
        role:
          type: string
          enum: [admin, doctor, staff, radiographer]
        isActive:
          type: boolean

    UserListResponse:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── PATIENT SCHEMAS ──────────────────────────────────────────────────────
    Patient:
      type: object
      required: [id, patientId, fullName, gender, createdAt]
      properties:
        id:
          type: string
        patientId:
          type: string
        fullName:
          type: string
        dateOfBirth:
          type: ["string", "null"]
        age:
          type: ["string", "null"]
        gender:
          type: string
          enum: [male, female, other]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        bloodGroup:
          type: ["string", "null"]
        emergencyContactName:
          type: ["string", "null"]
        emergencyContactPhone:
          type: ["string", "null"]
        allergies:
          type: ["string", "null"]
        medicalHistory:
          type: ["string", "null"]
        surgicalHistory:
          type: ["string", "null"]
        familyHistory:
          type: ["string", "null"]
        currentMedications:
          type: ["string", "null"]
        referringDoctorName:
          type: ["string", "null"]
        referringDoctorPhone:
          type: ["string", "null"]
        preferredLanguage:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string

    PatientInput:
      type: object
      required: [fullName, gender]
      properties:
        fullName:
          type: string
        dateOfBirth:
          type: string
        age:
          type: string
        gender:
          type: string
          enum: [male, female, other]
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        bloodGroup:
          type: string
        emergencyContactName:
          type: string
        emergencyContactPhone:
          type: string
        allergies:
          type: string
        medicalHistory:
          type: string
        surgicalHistory:
          type: string
        familyHistory:
          type: string
        currentMedications:
          type: string
        referringDoctorName:
          type: string
        referringDoctorPhone:
          type: string
        preferredLanguage:
          type: string

    PatientUpdate:
      type: object
      properties:
        fullName:
          type: string
        dateOfBirth:
          type: string
        age:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        bloodGroup:
          type: string
        emergencyContactName:
          type: string
        emergencyContactPhone:
          type: string
        allergies:
          type: string
        medicalHistory:
          type: string
        surgicalHistory:
          type: string
        familyHistory:
          type: string
        currentMedications:
          type: string
        referringDoctorName:
          type: string
        referringDoctorPhone:
          type: string

    PatientListResponse:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Patient"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    PatientHistory:
      type: object
      required: [patient, consultations, prescriptions, vitals, certificates]
      properties:
        patient:
          $ref: "#/components/schemas/Patient"
        consultations:
          type: array
          items:
            $ref: "#/components/schemas/Consultation"
        prescriptions:
          type: array
          items:
            $ref: "#/components/schemas/Prescription"
        vitals:
          type: array
          items:
            $ref: "#/components/schemas/Vitals"
        certificates:
          type: array
          items:
            $ref: "#/components/schemas/Certificate"

    Vitals:
      type: object
      required: [id, patientId, recordedAt]
      properties:
        id:
          type: string
        patientId:
          type: string
        temperature:
          type: ["string", "null"]
        bloodPressureSystolic:
          type: ["integer", "null"]
        bloodPressureDiastolic:
          type: ["integer", "null"]
        pulseRate:
          type: ["integer", "null"]
        respiratoryRate:
          type: ["integer", "null"]
        oxygenSaturation:
          type: ["number", "null"]
        weight:
          type: ["number", "null"]
        height:
          type: ["number", "null"]
        bmi:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        recordedAt:
          type: string
        recordedById:
          type: ["string", "null"]

    VitalsInput:
      type: object
      properties:
        consultationId:
          type: string
        temperature:
          type: string
        bloodPressureSystolic:
          type: integer
        bloodPressureDiastolic:
          type: integer
        pulseRate:
          type: integer
        respiratoryRate:
          type: integer
        oxygenSaturation:
          type: number
        weight:
          type: number
        height:
          type: number
        notes:
          type: string

    TimelineEvent:
      type: object
      required: [id, type, date, description]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [consultation, prescription, vitals, billing, certificate]
        date:
          type: string
        description:
          type: string
        referenceId:
          type: ["string", "null"]
        doctorName:
          type: ["string", "null"]

    # ── APPOINTMENT SCHEMAS ──────────────────────────────────────────────────
    Appointment:
      type: object
      required: [id, patientId, doctorId, appointmentDate, status, createdAt]
      properties:
        id:
          type: string
        patientId:
          type: string
        patientName:
          type: string
        patientPhone:
          type: ["string", "null"]
        doctorId:
          type: string
        doctorName:
          type: string
        appointmentDate:
          type: string
        appointmentTime:
          type: ["string", "null"]
        reason:
          type: ["string", "null"]
        status:
          type: string
          enum: [scheduled, confirmed, arrived, in_progress, completed, cancelled, no_show]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    AppointmentInput:
      type: object
      required: [patientId, doctorId, appointmentDate]
      properties:
        patientId:
          type: string
        doctorId:
          type: string
        appointmentDate:
          type: string
        appointmentTime:
          type: string
        reason:
          type: string
        notes:
          type: string

    AppointmentUpdate:
      type: object
      properties:
        appointmentDate:
          type: string
        appointmentTime:
          type: string
        status:
          type: string
          enum: [scheduled, confirmed, arrived, in_progress, completed, cancelled, no_show]
        reason:
          type: string
        notes:
          type: string

    AppointmentListResponse:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── QUEUE SCHEMAS ────────────────────────────────────────────────────────
    QueueToken:
      type: object
      required: [id, tokenNumber, patientId, doctorId, status, createdAt]
      properties:
        id:
          type: string
        tokenNumber:
          type: integer
        patientId:
          type: string
        patientName:
          type: string
        patientPhone:
          type: ["string", "null"]
        doctorId:
          type: string
        doctorName:
          type: string
        appointmentId:
          type: ["string", "null"]
        status:
          type: string
          enum: [waiting, called, in_consultation, completed, skipped, cancelled]
        priority:
          type: integer
        estimatedWaitMinutes:
          type: ["integer", "null"]
        queueDate:
          type: string
        createdAt:
          type: string
        visitType:
          type: string
          enum: [new, followup]
        consultationStartedAt:
          type: ["string", "null"]
        consultationEndedAt:
          type: ["string", "null"]

    TokenInput:
      type: object
      required: [patientId, doctorId, visitType]
      properties:
        patientId:
          type: string
        doctorId:
          type: string
        visitType:
          type: string
          enum: [new, followup]
        appointmentId:
          type: string
        priority:
          type: integer

    TokenStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [waiting, called, in_consultation, completed, skipped, cancelled]

    CallNextInput:
      type: object
      required: [doctorId]
      properties:
        doctorId:
          type: string

    QueueResponse:
      type: object
      required: [tokens, totalWaiting, currentlyServing]
      properties:
        tokens:
          type: array
          items:
            $ref: "#/components/schemas/QueueToken"
        totalWaiting:
          type: integer
        currentlyServing:
          type: ["integer", "null"]
        averageWaitMinutes:
          type: ["integer", "null"]

    # ── CONSULTATION SCHEMAS ─────────────────────────────────────────────────
    Consultation:
      type: object
      required: [id, patientId, doctorId, status, visitDate, createdAt]
      properties:
        id:
          type: string
        patientId:
          type: string
        patientName:
          type: string
        doctorId:
          type: string
        doctorName:
          type: string
        appointmentId:
          type: ["string", "null"]
        tokenId:
          type: ["string", "null"]
        visitDate:
          type: string
        status:
          type: string
          enum: [in_progress, completed, cancelled]
        chiefComplaint:
          type: ["string", "null"]
        historyOfPresentIllness:
          type: ["string", "null"]
        clinicalNotes:
          type: ["string", "null"]
        soapSubjective:
          type: ["string", "null"]
        soapObjective:
          type: ["string", "null"]
        soapAssessment:
          type: ["string", "null"]
        soapPlan:
          type: ["string", "null"]
        diagnosis:
          type: ["string", "null"]
        icd10Code:
          type: ["string", "null"]
        advice:
          type: ["string", "null"]
        followUpDate:
          type: ["string", "null"]
        followUpNotes:
          type: ["string", "null"]
        investigationOrders:
          type: ["string", "null"]
        clinicalAttachments:
          type: ["string", "null"]
        vitals:
          type: ["object", "null"]
          additionalProperties: true
        visitType:
          type: ["string", "null"]
          enum: [new, followup, null]
        createdAt:
          type: string
        updatedAt:
          type: string

    ConsultationInput:
      type: object
      required: [patientId, doctorId]
      properties:
        patientId:
          type: string
        doctorId:
          type: string
        appointmentId:
          type: string
        tokenId:
          type: string
        chiefComplaint:
          type: string

    ConsultationUpdate:
      type: object
      properties:
        chiefComplaint:
          type: string
        historyOfPresentIllness:
          type: string
        clinicalNotes:
          type: string
        soapSubjective:
          type: string
        soapObjective:
          type: string
        soapAssessment:
          type: string
        soapPlan:
          type: string
        diagnosis:
          type: string
        icd10Code:
          type: string
        advice:
          type: string
        followUpDate:
