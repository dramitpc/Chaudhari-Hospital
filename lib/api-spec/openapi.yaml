          type: string
        doctorId:
          type: string
        doctorName:
          type: string
        doctorRegistrationNumber:
          type: ["string", "null"]
        consultationId:
          type: ["string", "null"]
        visitDate:
          type: string
        diagnosis:
          type: ["string", "null"]
        advice:
          type: ["string", "null"]
        followUpDate:
          type: ["string", "null"]
        items:
