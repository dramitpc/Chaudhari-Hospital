version: "3.9"

# ─────────────────────────────────────────────────────────────────
#  ClinicOS — remote database variant for Synology NAS
#
#  Use this file when DATABASE_URL points to an external database
#  (e.g. the Replit-hosted Neon PostgreSQL instance).
#  The local clinicos-postgres container is NOT included here.
#
#  Usage:
#    docker compose -f deploy/docker-compose.remote-db.yml up -d
#
#  Required deploy/.env keys for this file:
#    DATABASE_URL=<full postgres connection string from Replit>
#    SESSION_SECRET=<long-random-secret>
#    HOST_PORT=8888   (or any free port; avoid 80 — DSM uses it)
# ─────────────────────────────────────────────────────────────────

services:

  # ── Express API server ─────────────────────────────────────────
  clinicos-api:
    build:
      context:    ..
      dockerfile: deploy/Dockerfile.api
    container_name: clinicos-api
    restart: unless-stopped
    environment:
      NODE_ENV:       production
      PORT:           "8080"
      DATABASE_URL:   ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
    networks:
      - clinicos

  # ── Frontend (nginx + static files) ───────────────────────────
  clinicos-frontend:
    build:
      context:    ..
      dockerfile: deploy/Dockerfile.hms
    container_name: clinicos-frontend
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8888}:80"
    depends_on:
      - clinicos-api
    networks:
      - clinicos

  # ── One-shot: run DB migrations + seed (first-time setup only) ─
  # Usage:  docker compose -f deploy/docker-compose.remote-db.yml run --rm clinicos-init
  clinicos-init:
    build:
      context:    ..
      dockerfile: deploy/Dockerfile.api
      target:     builder
    container_name: clinicos-init
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: >
      sh -c "
        pnpm --filter @workspace/db run push &&
        pnpm --filter @workspace/scripts run seed
      "
    networks:
      - clinicos
    profiles:
      - init

networks:
  clinicos:
    name: clinicos_network
